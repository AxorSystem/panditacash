<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="halo" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="coinInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="face" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <linearGradient id="ear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E2418"/>
      <stop offset="100%" stop-color="#0F0A05"/>
    </linearGradient>
  </defs>

  <!-- Halo dorado suave -->
  <circle cx="200" cy="200" r="200" fill="url(#halo)"/>

  <!-- MONEDA DORADA DE FONDO -->
  <g transform="translate(200 200)">
    <circle r="145" fill="url(#coin)"/>
    <circle r="145" fill="none" stroke="#B45309" stroke-width="4"/>
    <circle r="128" fill="url(#coinInner)" opacity="0.9"/>
    <circle r="128" fill="none" stroke="#B45309" stroke-width="2" stroke-dasharray="3 5" opacity="0.5"/>
  </g>

  <!-- OREJAS del panda -->
  <ellipse cx="128" cy="110" rx="34" ry="38" fill="url(#ear)"/>
  <ellipse cx="272" cy="110" rx="34" ry="38" fill="url(#ear)"/>
  <!-- Interior orejas (rosita) -->
  <ellipse cx="128" cy="118" rx="18" ry="20" fill="#F9A8A8" opacity="0.7"/>
  <ellipse cx="272" cy="118" rx="18" ry="20" fill="#F9A8A8" opacity="0.7"/>

  <!-- CARA del panda -->
  <g>
    <!-- Sombra suave debajo -->
    <ellipse cx="200" cy="298" rx="105" ry="10" fill="#000" opacity="0.15"/>
    <!-- Cara principal -->
    <ellipse cx="200" cy="205" rx="115" ry="108" fill="url(#face)"/>
    <ellipse cx="200" cy="205" rx="115" ry="108" fill="none" stroke="#2E2418" stroke-width="2.5"/>
  </g>

  <!-- Manchas de ojos -->
  <g fill="#1F1710">
    <ellipse cx="152" cy="188" rx="30" ry="38" transform="rotate(-15 152 188)"/>
    <ellipse cx="248" cy="188" rx="30" ry="38" transform="rotate(15 248 188)"/>
  </g>

  <!-- Ojos blancos + pupilas -->
  <g>
    <circle cx="156" cy="195" r="11" fill="#FFFFFF"/>
    <circle cx="244" cy="195" r="11" fill="#FFFFFF"/>
    <!-- Pupilas mirando ligeramente arriba y al centro -->
    <circle cx="159" cy="197" r="6" fill="#0F0A05"/>
    <circle cx="241" cy="197" r="6" fill="#0F0A05"/>
    <!-- Brillo -->
    <circle cx="161" cy="194" r="2" fill="#FFFFFF"/>
    <circle cx="243" cy="194" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Hocico -->
  <ellipse cx="200" cy="238" rx="22" ry="15" fill="#F5F0E6"/>

  <!-- Nariz -->
  <path d="M 190 232 Q 200 227 210 232 Q 200 244 190 232 Z" fill="#1F1710"/>

  <!-- Bocota sonriente -->
  <path d="M 200 244 Q 200 260 188 264" fill="none" stroke="#1F1710" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 200 244 Q 200 260 212 264" fill="none" stroke="#1F1710" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lengüita -->
  <path d="M 194 260 Q 200 268 206 260 L 206 262 Q 200 272 194 262 Z" fill="#EF6A70"/>

  <!-- Cachetitos rosados -->
  <ellipse cx="128" cy="228" rx="14" ry="10" fill="#F9A8A8" opacity="0.55"/>
  <ellipse cx="272" cy="228" rx="14" ry="10" fill="#F9A8A8" opacity="0.55"/>

  <!-- SIGNO DE PESO $ que agarra en la manita (esquina) -->
  <g transform="translate(310 300)">
    <!-- Moneda pequeña con $ -->
    <circle r="42" fill="url(#coin)" stroke="#B45309" stroke-width="3"/>
    <circle r="34" fill="url(#coinInner)"/>
    <text x="0" y="14" font-family="'Nunito', 'Inter', system-ui, sans-serif" font-size="46" font-weight="800" text-anchor="middle" fill="#B45309">$</text>
  </g>

  <!-- Bracito sujetando la moneda -->
  <g fill="#1F1710">
    <path d="M 268 268 Q 290 280 305 292 L 300 302 Q 280 288 260 278 Z"/>
  </g>
</svg>
